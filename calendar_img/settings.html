<!-- ===== iCal feeds ===== -->
<div class="form-group">
    <label class="form-label fw-semibold">📅 Calendar feeds</label>
    <small class="text-muted d-block mb-2">
        Add one or more iCal URLs. Each calendar gets its own pill colour.
        Google Calendar: Settings → your calendar → <em>Secret address in iCal format</em>.
    </small>
    <div id="feed_list"></div>
    <button type="button" class="action-button" onclick="addFeed()" style="margin-top:8px">
        + Add calendar feed
    </button>
    <input type="hidden" id="ical_feeds" name="ical_feeds" value="[]">
    <input type="hidden" id="ical_url"   name="ical_url"   value="">
</div>

<!-- ===== Calendar style ===== -->
<div class="form-group">
    <label class="form-label">Calendar style</label>
    <select class="form-input" id="cal_style" name="cal_style">
        <option value="grid">Monthly grid</option>
        <option value="agenda">Agenda list (upcoming events)</option>
    </select>
</div>

<div class="form-group" id="agenda_days_group" style="display:none">
    <label class="form-label">Days ahead (agenda)</label>
    <input type="number" class="form-input" id="agenda_days" name="agenda_days"
           value="14" min="3" max="60">
</div>

<div class="form-group">
    <label class="form-label">Language</label>
    <select class="form-input" id="language" name="language">
        <option value="en">English</option>
        <option value="cs">Čeština</option>
    </select>
</div>

<div class="form-group">
    <label class="form-label">Font size</label>
    <div style="display:flex;align-items:center;gap:12px">
        <input type="range" id="font_size" name="font_size"
               min="10" max="28" step="1" value="14"
               style="flex:1"
               oninput="document.getElementById('font_size_val').textContent = this.value + 'px'">
        <span id="font_size_val">14px</span>
    </div>
</div>

<!-- ===== Image slideshow ===== -->
<div class="form-group">
    <label class="form-label">🖼 Image slideshow</label>
    <small class="text-muted d-block" style="margin-bottom:8px">
        Upload images from your PC (.jpg, .png, .gif, .webp).
        Each display refresh cycles to the next image automatically.
    </small>

    <!-- File picker — uses InkyPi's uploadedFiles global, same as image_upload plugin -->
    <label for="imageUpload" class="form-input file-upload-label">Choose Images</label>
    <input type="file" clear-on-submit id="imageUpload" name="imageFiles[]"
           accept="image/*" multiple
           class="file-upload-input" onchange="addSlideFiles()">

    <!-- List of newly added + existing files -->
    <div id="slideFileNames" class="file-name-list" style="margin-top:8px"></div>

    <!-- Hidden inputs for existing saved file paths (same pattern as image_upload) -->
    <div id="slideHiddenInputs"></div>
</div>

<!-- ===== Split ratio ===== -->
<div class="form-group">
    <label class="form-label">
        Calendar width: <span id="cal_pct_val">65</span>%
        &nbsp;·&nbsp; Image width: <span id="img_pct_val">35</span>%
    </label>
    <input type="range" id="cal_pct" name="cal_pct"
           min="20" max="85" step="5" value="65"
           style="width:100%"
           oninput="updateSplitLabel(this.value)">
</div>

<!-- ===== Colours ===== -->
<div class="form-group">
    <label class="form-label">🎨 Colours</label>

    <div class="form-group nowrap">
        <label class="form-label">Calendar background</label>
        <input type="color" id="cal_bg" name="cal_bg" value="#FFFFFF" class="color-picker">
    </div>
    <div class="form-group nowrap">
        <label class="form-label">Calendar text</label>
        <input type="color" id="cal_text" name="cal_text" value="#000000" class="color-picker">
    </div>
    <div class="form-group nowrap">
        <label class="form-label">Header / today background</label>
        <input type="color" id="cal_header_bg" name="cal_header_bg" value="#000000" class="color-picker">
    </div>
    <div class="form-group nowrap">
        <label class="form-label">Header / today text</label>
        <input type="color" id="cal_header_text" name="cal_header_text" value="#FFFFFF" class="color-picker">
    </div>
    <div class="form-group nowrap">
        <label class="form-label">Image panel background</label>
        <input type="color" id="image_bg" name="image_bg" value="#000000" class="color-picker">
    </div>
    <div class="form-group nowrap">
        <label class="form-label">Divider line</label>
        <input type="color" id="divider_color" name="divider_color" value="#000000" class="color-picker">
    </div>
</div>

<script>
/* ═══ Split ratio label ═══════════════════════════════════════════════ */
function updateSplitLabel(v) {
    document.getElementById('cal_pct_val').textContent = v;
    document.getElementById('img_pct_val').textContent = 100 - parseInt(v);
}

/* ═══ Calendar style toggle ═══════════════════════════════════════════ */
function updateCalStyle() {
    var v = document.getElementById('cal_style').value;
    document.getElementById('agenda_days_group').style.display = v === 'agenda' ? '' : 'none';
}
document.getElementById('cal_style').addEventListener('change', updateCalStyle);

/* ═══ Calendar feeds ══════════════════════════════════════════════════ */
var DEFAULT_FEED_COLORS = [
    {border:'#FBBD02', fill:'#FFF2AD'},
    {border:'#1A73E8', fill:'#D2E8FB'},
    {border:'#34A853', fill:'#D4EDDA'},
    {border:'#EA4335', fill:'#FCDBD9'},
    {border:'#9C27B0', fill:'#EAD5F5'},
];
var feeds = [];

function renderFeeds() {
    var c = document.getElementById('feed_list');
    c.innerHTML = '';
    feeds.forEach(function(feed, i) {
        var def = DEFAULT_FEED_COLORS[i % DEFAULT_FEED_COLORS.length];
        var row = document.createElement('div');
        row.style.cssText = 'border:1px solid #ccc;border-radius:4px;padding:8px;margin-bottom:6px';
        row.innerHTML =
            '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end">' +
            '<div><label style="font-size:12px;display:block">Name</label>' +
            '<input type="text" class="form-input" style="width:120px" placeholder="My calendar"' +
            ' value="' + esc(feed.name||'') + '"' +
            ' onchange="feeds['+i+'].name=this.value;saveFeeds()"></div>' +
            '<div style="flex:1;min-width:200px"><label style="font-size:12px;display:block">iCal URL</label>' +
            '<input type="url" class="form-input" placeholder="https://..."' +
            ' value="' + esc(feed.url||'') + '"' +
            ' onchange="feeds['+i+'].url=this.value;saveFeeds()"></div>' +
            '<div><label style="font-size:12px;display:block">Border</label>' +
            '<input type="color" class="color-picker"' +
            ' value="' + (feed.border||def.border) + '"' +
            ' oninput="feeds['+i+'].border=this.value;saveFeeds()"></div>' +
            '<div><label style="font-size:12px;display:block">Fill</label>' +
            '<input type="color" class="color-picker"' +
            ' value="' + (feed.fill||def.fill) + '"' +
            ' oninput="feeds['+i+'].fill=this.value;saveFeeds()"></div>' +
            '<button type="button" class="remove-btn" onclick="removeFeed('+i+')">X</button>' +
            '</div>';
        c.appendChild(row);
    });
    saveFeeds();
}
function addFeed() {
    var i = feeds.length;
    var def = DEFAULT_FEED_COLORS[i % DEFAULT_FEED_COLORS.length];
    feeds.push({url:'', name:'Calendar '+(i+1), border:def.border, fill:def.fill});
    renderFeeds();
}
function removeFeed(i) { feeds.splice(i,1); renderFeeds(); }
function saveFeeds() {
    document.getElementById('ical_feeds').value = JSON.stringify(
        feeds.map(function(f){ return {url:f.url,name:f.name||'',border:f.border,fill:f.fill}; })
    );
    document.getElementById('ical_url').value = feeds.length ? (feeds[0].url||'') : '';
}

/* ═══ Image slideshow files — mirrors image_upload plugin exactly ═════
   InkyPi's plugin.html defines a global `uploadedFiles` object.
   On form submit it appends uploadedFiles["imageFiles[]"] as real
   multipart file parts. The server saves them to disk and stores paths.
   We just need to manage the display list and keep uploadedFiles in sync.
═══════════════════════════════════════════════════════════════════════ */
function addSlideFiles() {
    var fileInput  = document.getElementById('imageUpload');
    var listDiv    = document.getElementById('slideFileNames');
    var files      = Array.from(fileInput.files);

    if (!uploadedFiles['imageFiles[]']) {
        uploadedFiles['imageFiles[]'] = [];
    }

    files.forEach(function(file) {
        var name = file.name;
        // Prevent duplicates
        if (!uploadedFiles['imageFiles[]'].some(function(f){ return f.name === name; })) {
            uploadedFiles['imageFiles[]'].push(file);

            var el = document.createElement('div');
            el.id = 'added-' + name;
            el.className = 'file-name';
            el.setAttribute('delete-on-submit', '');
            el.innerHTML = '<span id="fileNameText">' + name + '</span>' +
                '<button type="button" class="remove-btn" onclick="removeSlideAdded(\'' + name + '\')">X</button>';
            listDiv.appendChild(el);
        }
    });
    fileInput.value = '';
}

function removeSlideAdded(name) {
    uploadedFiles['imageFiles[]'] = (uploadedFiles['imageFiles[]'] || []).filter(function(f){ return f.name !== name; });
    var el = document.getElementById('added-' + name);
    if (el) el.remove();
}

function removeSlideExisting(name) {
    var el1 = document.getElementById('existing-slide-' + name);
    var el2 = document.getElementById('hidden-slide-' + name);
    if (el1) el1.remove();
    if (el2) el2.remove();
}

/* ═══ Helpers ══════════════════════════════════════════════════════════ */
function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')
                  .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══ Prepopulate on load ══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
    if (loadPluginSettings) {
        /* selects */
        if (pluginSettings.cal_style)    document.getElementById('cal_style').value    = pluginSettings.cal_style;
        if (pluginSettings.language)     document.getElementById('language').value     = pluginSettings.language;
        if (pluginSettings.agenda_days)  document.getElementById('agenda_days').value  = pluginSettings.agenda_days;

        /* font size */
        var fs = pluginSettings.font_size || '14';
        document.getElementById('font_size').value = fs;
        document.getElementById('font_size_val').textContent = fs + 'px';

        /* split ratio */
        var pct = pluginSettings.cal_pct || '65';
        document.getElementById('cal_pct').value = pct;
        updateSplitLabel(pct);

        /* colours */
        var defaults = {cal_bg:'#FFFFFF', cal_text:'#000000',
                        cal_header_bg:'#000000', cal_header_text:'#FFFFFF',
                        image_bg:'#000000', divider_color:'#000000'};
        Object.keys(defaults).forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.value = pluginSettings[id] || defaults[id];
        });

        /* calendar feeds */
        try {
            var pf = JSON.parse(pluginSettings.ical_feeds || '[]');
            feeds = pf.length ? pf.map(function(f,i){
                var def = DEFAULT_FEED_COLORS[i % DEFAULT_FEED_COLORS.length];
                return {url:f.url||'', name:f.name||'Calendar '+(i+1),
                        border:f.border||def.border, fill:f.fill||def.fill};
            }) : [];
        } catch(e) { feeds = []; }
        if (!feeds.length && pluginSettings.ical_url)
            feeds.push({url:pluginSettings.ical_url, name:'Calendar 1',
                        border:DEFAULT_FEED_COLORS[0].border,
                        fill:DEFAULT_FEED_COLORS[0].fill});
        if (!feeds.length) addFeed(); else renderFeeds();

        /* existing uploaded images — show filenames + hidden inputs with saved paths */
        var existingFiles = pluginSettings['imageFiles[]'] || [];
        if (!Array.isArray(existingFiles)) existingFiles = [existingFiles];
        var listDiv    = document.getElementById('slideFileNames');
        var hiddenDiv  = document.getElementById('slideHiddenInputs');

        existingFiles.forEach(function(filePath) {
            var name = filePath.split('/').pop();

            var el = document.createElement('div');
            el.id = 'existing-slide-' + name;
            el.className = 'file-name';
            el.setAttribute('delete-on-submit', '');
            el.innerHTML = '<span id="fileNameText">' + name + '</span>' +
                '<button type="button" class="remove-btn" onclick="removeSlideExisting(\'' + name + '\')">X</button>';
            listDiv.appendChild(el);

            var inp = document.createElement('input');
            inp.type  = 'hidden';
            inp.name  = 'imageFiles[]';
            inp.value = filePath;
            inp.id    = 'hidden-slide-' + name;
            inp.setAttribute('delete-on-submit', '');
            hiddenDiv.appendChild(inp);
        });
    } else {
        addFeed();
    }
    updateCalStyle();
});
</script>
